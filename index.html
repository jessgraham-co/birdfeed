<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>birdfeed</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #666;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overscroll-behavior: none;
  }

  .screen { display: none; height: 100vh; height: 100dvh; flex-direction: column; }
  .screen.active { display: flex; }

  /* ── HOME ── */
  #home {
    padding: 0 24px;
    padding-top: env(safe-area-inset-top, 20px);
  }

  .home-header {
    padding: 28px 0 20px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .home-header h1 {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -1px;
    color: var(--accent);
  }
  .home-header span {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .search-row {
    display: flex;
    gap: 10px;
    margin-bottom: 32px;
  }
  .search-row input {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-size: 16px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-row input::placeholder { color: var(--muted); }
  .search-row input:focus { border-color: var(--accent); }
  .search-row button {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: var(--radius);
    padding: 14px 20px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    white-space: nowrap;
  }
  .search-row button:active { opacity: 0.8; }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .saved-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-bottom: 32px;
  }
  .saved-item {
    display: flex;
    align-items: center;
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .saved-item-btn {
    flex: 1;
    padding: 14px 16px;
    background: none;
    border: none;
    color: var(--text);
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    text-align: left;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    min-width: 0;
  }
  .saved-item-btn .username {
    display: flex;
    align-items: center;
    gap: 6px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  
  .saved-delete {
    padding: 14px 12px 14px 4px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
  }
  .saved-delete:active { color: var(--accent2); }
  .empty-saved {
    color: var(--muted);
    font-size: 14px;
    text-align: center;
    padding: 24px 0;
    font-family: 'DM Mono', monospace;
  }

  .error-banner {
    background: rgba(255,107,53,0.12);
    border: 1px solid var(--accent2);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 13px;
    color: var(--accent2);
    font-family: 'DM Mono', monospace;
    margin-bottom: 16px;
    line-height: 1.5;
  }

  /* ── LOADING ── */
  #loading {
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
  }

  /* ── FEED ── */
  #feed {
    position: relative;
    overflow: hidden;
  }

  .feed-topbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 50;
    padding: env(safe-area-inset-top, 12px) 16px 12px;
    background: linear-gradient(to bottom, rgba(10,10,10,0.95) 60%, transparent);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .back-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
  }
  .back-btn:active { opacity: 0.7; }
  .feed-username {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--accent);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .save-btn {
    background: none;
    border: 1.5px solid var(--accent);
    color: var(--accent);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    white-space: nowrap;
  }
  .save-btn.saved-state { background: var(--accent); color: #000; }
  .save-btn:active { opacity: 0.7; }

  .video-counter {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    position: absolute;
    top: calc(env(safe-area-inset-top, 12px) + 52px);
    right: 16px;
    z-index: 51;
    background: rgba(0,0,0,0.5);
    padding: 4px 8px;
    border-radius: 6px;
  }

  .video-scroll {
    flex: 1;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .video-scroll::-webkit-scrollbar { display: none; }

  .video-slide {
    height: 100vh;
    height: 100dvh;
    scroll-snap-align: start;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }

  .video-slide iframe {
    width: 100%;
    height: 100%;
    border: none;
    position: absolute;
    top: 0; left: 0;
  }

  .mute-btn {
    position: absolute;
    top: 50%;
    right: 16px;
    z-index: 20;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50%;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    cursor: pointer;
    color: white;
    transform: translateY(-50%);
  }
  .mute-btn:active { opacity: 0.7; }

  .video-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    padding: 80px 16px 32px;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
    padding-bottom: max(32px, env(safe-area-inset-bottom));
  }

  .video-caption {
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
    margin-bottom: 12px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .video-caption.expanded {
    display: block;
    -webkit-line-clamp: unset;
  }
  .caption-toggle {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    padding: 0;
    margin-bottom: 12px;
    display: block;
  }

  .video-stats {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
  }

  .comments-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 8px 16px;
    color: var(--text);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    width: fit-content;
  }
  .comments-toggle:active { opacity: 0.7; }

  /* ── COMMENTS DRAWER ── */
  .comments-drawer {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 100;
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    border-top: 1px solid var(--border);
    max-height: 70dvh;
    display: flex;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  .comments-drawer.open { transform: translateY(0); }
  .drawer-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 8px;
    flex-shrink: 0;
  }
  .drawer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 20px 12px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  .drawer-header h3 { font-size: 15px; font-weight: 600; }
  .drawer-close {
    background: none; border: none;
    color: var(--muted); font-size: 22px;
    cursor: pointer; line-height: 1; padding: 0;
  }
  .comments-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    -webkit-overflow-scrolling: touch;
  }
  .comment-item { display: flex; gap: 12px; }
  .comment-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: var(--muted);
    flex-shrink: 0;
    font-family: 'DM Mono', monospace;
  }
  .comment-user {
    font-size: 12px; font-weight: 600;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    margin-bottom: 3px;
  }
  .comment-text { font-size: 14px; line-height: 1.4; color: var(--text); }
  .comment-likes { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: 'DM Mono', monospace; }
  .comments-loading, .comments-empty {
    text-align: center; padding: 24px;
    font-size: 14px; color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-header">
    <h1>birdfeed</h1>
    <span>tiktok viewer</span>
    <div id="credit-badge" style="
      margin-left: auto;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
      white-space: nowrap;
    ">⚡ —</div>
  </div>
  <div id="error-home"></div>
  <div class="search-row">
    <input type="text" id="username-input" placeholder="@username" autocapitalize="none" autocorrect="off" spellcheck="false" />
    <button id="go-btn">Watch</button>
  </div>
  <div class="section-label">Saved accounts</div>
  <div class="saved-list" id="saved-list"></div>
</div>

<!-- LOADING -->
<div id="loading" class="screen">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">Loading…</div>
</div>

<!-- FEED -->
<div id="feed" class="screen">
  <div class="feed-topbar">
    <button class="back-btn" id="back-btn">← Back</button>
    <div class="feed-username" id="feed-username"></div>
    <button class="save-btn" id="save-btn">+ Save</button>
  </div>
  <div class="video-counter" id="video-counter"></div>
  <div class="video-scroll" id="video-scroll"></div>
</div>

<script>
// ── CONFIG ──
// All API calls go through your Cloudflare Worker, which proxies to ScrapeCreators.
// Replace WORKER_URL with your actual worker URL e.g. https://birdfeed-proxy.yourname.workers.dev
const WORKER_URL = 'https://birdfeed-proxy.jessgraham-co.workers.dev';

// ── STORAGE (URL hash, works on file:// in all browsers) ──
function loadSavedFromHash() {
  try {
    const params = new URLSearchParams(window.location.hash.slice(1));
    const raw = params.get('users');
    return raw ? raw.split(',').filter(Boolean) : [];
  } catch(e) { return []; }
}
function saveSavedToHash(users) {
  try {
    const params = new URLSearchParams(window.location.hash.slice(1));
    if (users.length > 0) { params.set('users', users.join(',')); }
    else { params.delete('users'); }
    history.replaceState(null, '', '#' + params.toString());
  } catch(e) {}
  try { localStorage.setItem('birdfeed_saved', JSON.stringify(users)); } catch(e) {}
}

// ── STATE ──
let currentUser = '';
let savedUsers = (() => {
  const fromHash = loadSavedFromHash();
  if (fromHash.length > 0) return fromHash;
  try { return JSON.parse(localStorage.getItem('birdfeed_saved') || '[]'); } catch(e) { return []; }
})();
let videos = [];
let currentSlide = 0;
let globalMuted = true;

// ── DOM ──
const homeScreen    = document.getElementById('home');
const loadingScreen = document.getElementById('loading');
const feedScreen    = document.getElementById('feed');
const usernameInput = document.getElementById('username-input');
const goBtn         = document.getElementById('go-btn');
const savedList     = document.getElementById('saved-list');
const errorHome     = document.getElementById('error-home');
const feedUsername  = document.getElementById('feed-username');
const saveBtn       = document.getElementById('save-btn');
const backBtn       = document.getElementById('back-btn');
const videoScroll   = document.getElementById('video-scroll');
const loadingText   = document.getElementById('loading-text');
const videoCounter  = document.getElementById('video-counter');

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── SAVED USERS ──
function saveSavedUsers() { saveSavedToHash(savedUsers); }

function getLastPostCache() {
  try { return JSON.parse(localStorage.getItem('birdfeed_lastpost') || '{}'); } catch(e) { return {}; }
}

function lastPostLabel(username) {
  const cache = getLastPostCache();
  const ts = cache[username.toLowerCase()];
  if (!ts) return '';
  const now = Date.now();
  const diff = now - ts;
  const mins  = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days  = Math.floor(diff / 86400000);
  const weeks = Math.floor(days / 7);
  const months= Math.floor(days / 30);
  let label, color;
  if (days < 1)        { label = 'posted today';          color = '#4ade80'; }
  else if (days < 2)   { label = 'posted yesterday';      color = '#4ade80'; }
  else if (days < 7)   { label = `posted ${days}d ago`;   color = '#e8ff47'; }
  else if (weeks < 5)  { label = `posted ${weeks}w ago`;  color = '#e8ff47'; }
  else if (months < 3) { label = `posted ${months}mo ago`;color = '#ff9500'; }
  else                 { label = `posted ${months}mo ago`;color = '#ff6b35'; }
  return `<span style="
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: ${color};
    background: ${color}18;
    border: 1px solid ${color}44;
    border-radius: 20px;
    padding: 2px 8px;
    white-space: nowrap;
    flex-shrink: 0;
  ">${label}</span>`;
}

function renderSavedList() {
  if (savedUsers.length === 0) {
    savedList.innerHTML = '<div class="empty-saved">No saved accounts yet</div>';
    return;
  }
  savedList.innerHTML = savedUsers.map(u => `
    <div class="saved-item">
      <button class="saved-item-btn" data-user="${escHtml(u)}">
        <span class="username"><span style="color:var(--accent);font-family:'DM Mono',monospace;font-size:13px;">@</span>${escHtml(u)}</span>
        ${lastPostLabel(u)}
      </button>
      <button class="saved-delete" data-user="${escHtml(u)}" title="Remove">×</button>
    </div>
  `).join('');
}
savedList.addEventListener('click', e => {
  const btn = e.target.closest('.saved-item-btn');
  const del = e.target.closest('.saved-delete');
  if (btn) loadUser(btn.dataset.user);
  if (del) {
    savedUsers = savedUsers.filter(u => u !== del.dataset.user);
    saveSavedUsers();
    renderSavedList();
  }
});

function updateSaveBtn() {
  const saved = savedUsers.includes(currentUser);
  saveBtn.textContent = saved ? '✓ Saved' : '+ Save';
  saveBtn.className = 'save-btn' + (saved ? ' saved-state' : '');
}
saveBtn.addEventListener('click', () => {
  if (savedUsers.includes(currentUser)) {
    savedUsers = savedUsers.filter(u => u !== currentUser);
  } else {
    savedUsers.unshift(currentUser);
  }
  saveSavedUsers();
  updateSaveBtn();
  renderSavedList();
});

// ── FETCH VIDEOS VIA WORKER ──
async function fetchVideos(username, cursor = '') {
  const params = new URLSearchParams({ action: 'videos', handle: username });
  if (cursor) params.set('cursor', cursor);
  const res = await fetch(`${WORKER_URL}?${params}`);
  if (!res.ok) {
    const txt = await res.text().catch(() => '');
    throw new Error(`API error ${res.status}: ${txt.slice(0, 200)}`);
  }
  return res.json();
}

// ── FETCH COMMENTS VIA WORKER ──
async function fetchComments(videoId) {
  const res = await fetch(`${WORKER_URL}?action=comments&video_id=${videoId}`);
  if (!res.ok) throw new Error(`Comments API error ${res.status}`);
  return res.json();
}

// ── LOAD USER ──
async function loadUser(username) {
  username = username.replace('@', '').trim();
  if (!username) return;
  currentUser = username;
  errorHome.innerHTML = '';
  videos = [];
  showScreen('loading');
  loadingText.textContent = `Loading @${username}…`;

  try {
    const data = await fetchVideos(username);

    const rawList = data?.aweme_list || data?.videos || data?.data || [];
    if (!rawList.length) {
      throw new Error(`No videos found for "@${username}". Check the username and try again.`);
    }

    videos = rawList.map(parseVideo).filter(v => v.videoUrl);

    if (!videos.length) {
      throw new Error(`Found ${rawList.length} posts but couldn't extract playable video URLs. The account may only have slideshows or private content.`);
    }

    // Store cursor for lazy loading more
    window._nextCursor = data?.cursor || data?.next_cursor || '';
    window._currentHandle = username;
    window._pendingLoad = false;

    buildFeed();
    showScreen('feed');
    feedUsername.textContent = '@' + username;
    updateSaveBtn();
    spendCredit();

    // Cache the most recent post date for the saved card
    if (videos.length > 0) {
      const firstItem = rawList.find(v => v.create_time || v.createTime);
      const ts = firstItem?.create_time || firstItem?.createTime || 0;
      if (ts) {
        try {
          const cache = JSON.parse(localStorage.getItem('birdfeed_lastpost') || '{}');
          cache[username.toLowerCase()] = ts * 1000;
          localStorage.setItem('birdfeed_lastpost', JSON.stringify(cache));
        } catch(e) {}
      }
    }

  } catch(err) {
    showScreen('home');
    errorHome.innerHTML = `<div class="error-banner">⚠ ${escHtml(err.message)}</div>`;
  }
}

// ── PARSE A VIDEO OBJECT ──
function parseVideo(item) {
  const id = item?.aweme_id || item?.id || '';
  const desc = item?.desc || item?.description || '';
  const author = item?.author?.unique_id || item?.author?.uniqueId || '';

  // Video URL — try multiple fields
  const videoUrl =
    item?.video?.play_addr?.url_list?.[0] ||
    item?.video?.download_addr?.url_list?.[0] ||
    item?.video?.playAddr ||
    item?.video?.downloadAddr ||
    item?.play_url ||
    '';

  // Cover image
  const cover =
    item?.video?.cover?.url_list?.[0] ||
    item?.video?.origin_cover?.url_list?.[0] ||
    item?.video?.cover ||
    '';

  const stats = {
    plays:    fmt(item?.statistics?.play_count    || item?.stats?.playCount    || 0),
    likes:    fmt(item?.statistics?.digg_count    || item?.stats?.diggCount    || 0),
    comments: fmt(item?.statistics?.comment_count || item?.stats?.commentCount || 0),
  };

  return { id, author, desc, videoUrl, cover, stats };
}

function fmt(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return String(n);
}

// ── BUILD FEED ──
function buildFeed() {
  videoScroll.innerHTML = '';
  currentSlide = 0;
  videos.forEach((v, i) => appendSlide(v, i));
  updateCounter();
  setupScrollObserver();
}

function appendSlide(v, i) {
  const slide = document.createElement('div');
  slide.className = 'video-slide';
  slide.dataset.index = i;

  const hasCaption = v.desc && v.desc.trim().length > 0;

  slide.innerHTML = `
    <iframe
      data-id="${escHtml(v.id)}"
      src="about:blank"
      allowfullscreen
      allow="autoplay; encrypted-media"
      scrolling="no"
    ></iframe>
    <div class="video-overlay">
      ${hasCaption ? `
        <div class="video-caption" id="cap-${i}">${escHtml(v.desc)}</div>
        <button class="caption-toggle" id="captoggle-${i}" onclick="toggleCaption(${i})">more</button>
      ` : ''}
      <div class="video-stats">
        <span>▶ ${v.stats.plays}</span>
        <span>♥ ${v.stats.likes}</span>
        <span>💬 ${v.stats.comments}</span>
      </div>
      ${v.id ? `<button class="comments-toggle" onclick="openComments(${i})">💬 Comments</button>` : ''}
    </div>
    <div class="comments-drawer" id="drawer-${i}">
      <div class="drawer-handle"></div>
      <div class="drawer-header">
        <h3>Comments</h3>
        <button class="drawer-close" onclick="closeComments(${i})">×</button>
      </div>
      <div class="comments-list" id="comments-${i}">
        <div class="comments-loading">Tap to load…</div>
      </div>
    </div>
  `;
  videoScroll.appendChild(slide);
}

// ── CAPTION TOGGLE ──
function toggleCaption(i) {
  const cap = document.getElementById('cap-' + i);
  const btn = document.getElementById('captoggle-' + i);
  if (!cap) return;
  const expanded = cap.classList.toggle('expanded');
  btn.textContent = expanded ? 'less' : 'more';
}

// ── BACK ──
backBtn.addEventListener('click', () => {
  // Unload all iframes to stop playback
  document.querySelectorAll('.video-slide iframe').forEach(f => { f.src = 'about:blank'; });
  if (window._observer) window._observer.disconnect();
  showScreen('home');
  updateCreditBadge(getCredits());
  renderSavedList();
});
function setupScrollObserver() {
  if (window._observer) window._observer.disconnect();
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const slide = entry.target;
      const iframe = slide.querySelector('iframe');
      if (!iframe) return;
      const videoId = iframe.dataset.id;
      if (entry.isIntersecting && entry.intersectionRatio >= 0.6) {
        // Load the iframe when it comes into view
        if (!iframe.src || iframe.src === 'about:blank') {
          iframe.src = `https://www.tiktok.com/embed/v2/${videoId}`;
        }
        currentSlide = parseInt(slide.dataset.index);
        updateCounter();
        document.querySelectorAll('.comments-drawer.open').forEach(d => d.classList.remove('open'));
        if (currentSlide >= videos.length - 3 && window._nextCursor && !window._pendingLoad) {
          loadMoreVideos();
        }
      }
    });
  }, { threshold: 0.6 });

  document.querySelectorAll('.video-slide').forEach(s => observer.observe(s));
  window._observer = observer;
}

// ── LOAD MORE (pagination) ──
async function loadMoreVideos() {
  if (!window._nextCursor || window._pendingLoad) return;
  window._pendingLoad = true;
  try {
    const data = await fetchVideos(window._currentHandle, window._nextCursor);
    const rawList = data?.aweme_list || data?.videos || data?.data || [];
    const newVideos = rawList.map(parseVideo).filter(v => v.videoUrl);
    newVideos.forEach(v => {
      videos.push(v);
      appendSlide(v, videos.length - 1);
      // observe the new slide
      const slides = document.querySelectorAll('.video-slide');
      const lastSlide = slides[slides.length - 1];
      if (window._observer && lastSlide) window._observer.observe(lastSlide);
    });
    window._nextCursor = data?.cursor || data?.next_cursor || '';
    updateCounter();
  } catch(e) {
    // silently fail — user just won't get more videos
  }
  window._pendingLoad = false;
}

// ── COUNTER ──
function updateCounter() {
  videoCounter.textContent = `${currentSlide + 1} / ${videos.length}`;
}

// ── COMMENTS ──
async function openComments(i) {
  const drawer = document.getElementById('drawer-' + i);
  const list   = document.getElementById('comments-' + i);
  drawer.classList.add('open');
  if (list.dataset.loaded) return;
  list.dataset.loaded = 'true';
  list.innerHTML = '<div class="comments-loading">Loading comments…</div>';

  try {
    const v = videos[i];
    const data = await fetchComments(v.id);
    const comments = data?.comments || data?.data || [];

    if (!comments.length) {
      list.innerHTML = '<div class="comments-empty">No comments found.</div>';
      return;
    }

    list.innerHTML = comments.slice(0, 50).map(c => {
      const user  = c?.user?.unique_id || c?.user?.nickname || c?.author || '?';
      const text  = c?.text || c?.comment || '';
      const likes = c?.digg_count || c?.like_count || 0;
      return `
        <div class="comment-item">
          <div class="comment-avatar">${escHtml((user[0] || '?').toUpperCase())}</div>
          <div class="comment-body">
            <div class="comment-user">@${escHtml(user)}</div>
            <div class="comment-text">${escHtml(text)}</div>
            ${likes ? `<div class="comment-likes">♥ ${fmt(likes)}</div>` : ''}
          </div>
        </div>
      `;
    }).join('');
  } catch(e) {
    list.innerHTML = `<div class="comments-empty">Couldn't load comments.</div>`;
  }
}

function closeComments(i) {
  document.getElementById('drawer-' + i)?.classList.remove('open');
}

// ── BACK ──
backBtn.addEventListener('click', () => {
  // Unload all iframes to stop playback
  if (window._observer) window._observer.disconnect();
  showScreen('home');
  updateCreditBadge(getCredits());
  renderSavedList();
});

// ── GO ──
goBtn.addEventListener('click', () => loadUser(usernameInput.value));
usernameInput.addEventListener('keydown', e => { if (e.key === 'Enter') loadUser(usernameInput.value); });

// ── UTILS ──
function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── CREDIT COUNTER (local, starts at 100) ──
function getCredits() {
  try {
    const params = new URLSearchParams(window.location.hash.slice(1));
    const stored = params.get('credits');
    if (stored !== null) return parseInt(stored);
    // Fall back to localStorage for anyone upgrading from old version
    const ls = localStorage.getItem('birdfeed_credits');
    return ls !== null ? parseInt(ls) : 98;
  } catch(e) { return 100; }
}
function spendCredit() {
  const current = getCredits();
  const next = Math.max(0, current - 1);
  try {
    const params = new URLSearchParams(window.location.hash.slice(1));
    params.set('credits', String(next));
    history.replaceState(null, '', '#' + params.toString());
    localStorage.setItem('birdfeed_credits', String(next));
  } catch(e) {}
  updateCreditBadge(next);
}
function updateCreditBadge(count) {
  const badge = document.getElementById('credit-badge');
  if (!badge) return;
  badge.textContent = '';
  badge.innerHTML = `<span style="color:#e8ff47">⚡</span> ${count} credits`;
  badge.style.color = count < 20 ? 'var(--accent2)' : 'var(--muted)';
}

// ── INIT ──
renderSavedList();
updateCreditBadge(getCredits());
</script>
